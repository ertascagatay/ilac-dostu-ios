name: ilac_dostu
description: Ilac Dostu - Dual-mode medication tracker with Firebase sync
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.13.6
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  google_fonts: ^6.1.0
  home_widget: ^0.7.0
  timezone: ^0.9.2
  
  # State Management & UI
  provider: ^6.1.1
  
  # Image & Storage
  image_picker: ^1.0.7
  firebase_storage: ^11.6.0
  cached_network_image: ^3.3.1
  
  # Charts
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
