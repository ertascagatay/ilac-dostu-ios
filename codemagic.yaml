workflows:
  ios-simulator-appetize:
    name: iOS Simulator Build for Appetize
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Clean build artifacts
        script: |
          flutter clean
          rm -rf build/
          rm -rf .dart_tool/
      
      - name: Verify lib structure
        script: |
          echo "Checking lib/theme directory..."
          ls -la lib/theme/
          echo "Checking imports in main.dart..."
          grep -n "import.*theme" lib/main.dart || true
      
      - name: Clean iOS build artifacts
        script: |
          # Don't delete iOS folder - just clean build artifacts
          cd ios
          rm -rf build/
          rm -rf Pods/
          rm -rf Podfile.lock
          rm -rf .symlinks/
          cd ..
      
      - name: Refresh packages after iOS regeneration
        script: |
          flutter pub get
          flutter pub upgrade
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod repo update
          pod deintegrate || true
          pod cache clean --all || true
          pod install --repo-update
          cd ..
      
      - name: Build iOS Simulator (Debug, No Codesign)
        script: |
          export EXCLUDED_ARCHS=x86_64
          export ONLY_ACTIVE_ARCH=YES
          flutter build ios --debug --no-codesign --simulator
      
      - name: Zip .app bundle for Appetize
        script: |
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app
    artifacts:
      - build/ios/iphonesimulator/Runner.app.zip
    publishing:
      email:
        recipients:
          - ertascagatay@gmail.com
