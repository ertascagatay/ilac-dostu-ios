workflows:
  # Web Testing Workflow
  web-testing:
    name: Web Build and Test
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      node: latest
    
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
      
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
      
      - name: Run Flutter analyze
        script: |
          flutter analyze
      
      - name: Run unit tests
        script: |
          flutter test --coverage
      
      - name: Build web release
        script: |
          flutter build web --release
      
      - name: Run integration tests
        script: |
          flutter test integration_test/
      
    artifacts:
      - build/web/**
      - coverage/**
    
    publishing:
      email:
        recipients:
          - ertascagatay@gmail.com
      
  # iOS Simulator Testing Workflow  
  ios-simulator-testing:
    name: iOS Simulator Build and Test
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'develop'
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Clean build artifacts
        script: |
          flutter clean
          rm -rf build/
          rm -rf .dart_tool/
      
      - name: Ensure iOS project structure
        script: |
          # Check if Runner.xcodeproj exists
          if [ ! -d "ios/Runner.xcodeproj" ]; then
            echo "Runner.xcodeproj not found, generating iOS project..."
            
            # Generate iOS project structure
            flutter create --org=com.medtracker --platforms=ios .
            
            # CRITICAL: Regenerate plugin registration immediately
            echo "Regenerating plugin registration..."
            flutter pub get
            
            # Verify Firebase plugins are registered
            if grep -q "cloud_firestore" ios/Runner/GeneratedPluginRegistrant.m; then
              echo "✓ cloud_firestore plugin registered successfully"
            else
              echo "ERROR: cloud_firestore not registered after flutter create!"
              exit 1
            fi
          else
            echo "✓ Runner.xcodeproj exists"
          fi
      
      - name: Verify plugin registration
        script: |
          # Double-check GeneratedPluginRegistrant has Firebase imports
          echo "Verifying GeneratedPluginRegistrant.m..."
          if grep -q "cloud_firestore" ios/Runner/GeneratedPluginRegistrant.m; then
            echo "✓ cloud_firestore plugin registered"
          else
            echo "WARNING: cloud_firestore not found, regenerating..."
            flutter pub get
          fi
      
      - name: Clean iOS build artifacts
        script: |
          # Clean build artifacts and CocoaPods cache
          cd ios
          rm -rf build/
          rm -rf Pods/
          rm -rf Podfile.lock
          rm -rf .symlinks/
          cd ..
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          # Install pods with repo update for latest versions
          pod install --repo-update
          cd ..
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          # Install pods with repo update for latest versions
          pod install --repo-update
          cd ..
      
    artifacts:
      - build/ios/iphonesimulator/Runner.app.zip
      - coverage/**
    
    publishing:
      email:
        recipients:
          - ertascagatay@gmail.com
  
  # Android Testing Workflow
  android-testing:
    name: Android Build and Test
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: stable
      java: 11
      
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
      
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
      
      - name: Run Flutter analyze
        script: |
          flutter analyze
      
      - name: Run unit tests
        script: |
          flutter test --coverage
      
      - name: Build Android APK
        script: |
          flutter build apk --debug
      
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release
      
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/**/*.aab
      - coverage/**
    
    publishing:
      email:
        recipients:
          - ertascagatay@gmail.com
    artifacts:
      - build/ios/iphonesimulator/Runner.app.zip
    publishing:
      email:
        recipients:
          - ertascagatay@gmail.com
