workflows:
  ios-simulator-appetize:
    name: iOS Simulator Build for Appetize
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Force regenerate iOS project structure
        script: |
          # Backup custom iOS files
          cp ios/Runner/Info.plist /tmp/Info.plist.backup || true
          cp ios/Runner/MedicationWidget.swift /tmp/MedicationWidget.swift.backup || true
          cp ios/Podfile /tmp/Podfile.backup || true
          
          # Remove entire iOS folder
          rm -rf ios
          
          # Recreate iOS platform from scratch
          flutter create --org=com.medtracker --platforms=ios .
          
          # Restore custom files
          cp /tmp/Info.plist.backup ios/Runner/Info.plist || true
          cp /tmp/MedicationWidget.swift.backup ios/Runner/MedicationWidget.swift || true
          cp /tmp/Podfile.backup ios/Podfile || true
          
          # Verify xcodeproj was created
          ls -la ios/Runner.xcodeproj || (echo "ERROR: Runner.xcodeproj not created!" && exit 1)
      
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      
      - name: Build iOS Simulator (Debug, No Codesign)
        script: |
          flutter build ios --debug --no-codesign --simulator
      
      - name: Zip .app bundle for Appetize
        script: |
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app
    artifacts:
      - build/ios/iphonesimulator/Runner.app.zip
    publishing:
      email:
        recipients:
          - ertascagatay@gmail.com
