workflows:
  ios-simulator-appetize:
    name: iOS Simulator Build for Appetize
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Clean build artifacts
        script: |
          flutter clean
          rm -rf build/
          rm -rf .dart_tool/
      
      - name: Verify iOS project structure
        script: |
          # Verify iOS project exists (should be committed in repo)
          if [ ! -d "ios/Runner.xcodeproj" ]; then
            echo "ERROR: ios/Runner.xcodeproj not found!"
            echo "The iOS project should be committed to your repository."
            exit 1
          fi
          echo "✓ iOS project structure exists"
      
      - name: Verify plugin registration
        script: |
          # Verify GeneratedPluginRegistrant has Firebase imports
          echo "Checking GeneratedPluginRegistrant.m for Firebase plugins..."
          if grep -q "cloud_firestore" ios/Runner/GeneratedPluginRegistrant.m; then
            echo "✓ cloud_firestore plugin registered"
          else
            echo "WARNING: cloud_firestore not found in GeneratedPluginRegistrant.m"
            echo "This may cause build failures. Running flutter pub get to regenerate..."
            flutter pub get
          fi
      
      - name: Clean iOS build artifacts
        script: |
          # Clean build artifacts and CocoaPods cache
          cd ios
          rm -rf build/
          rm -rf Pods/
          rm -rf Podfile.lock
          rm -rf .symlinks/
          cd ..
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          # Install pods with repo update for latest versions
          pod install --repo-update
          cd ..
      
      - name: Build iOS Simulator (Debug, No Codesign)
        script: |
          export EXCLUDED_ARCHS=x86_64
          export ONLY_ACTIVE_ARCH=YES
          flutter build ios --debug --no-codesign --simulator
      
      - name: Zip .app bundle for Appetize
        script: |
          cd build/ios/iphonesimulator
          zip -r Runner.app.zip Runner.app
    artifacts:
      - build/ios/iphonesimulator/Runner.app.zip
    publishing:
      email:
        recipients:
          - ertascagatay@gmail.com
